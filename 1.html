<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>넷플릭스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="logo">
    <img src="image-removebg-preview (5).png" alt="넷플릭스 로고" style="width: 150px; height: auto;">
    </div>
    <div class="top-right">
      <select>
        <option>한국어</option>
        <option>English</option>
      </select>
      <button class="login-btn">로그인</button>
    </div>
  </header>
  <div class="main">
    <div class="overlay"></div>
    <div class="content">
      <h1>영화, 시리즈 등을<br>무제한으로</h1>
      <p class="sub">7,000원으로 시작하세요. 멤버십은 언제든지 해지 가능합니다.</p>
      <p class="desc">시청할 준비가 되셨나요? 멤버십을 등록하거나 재시작하려면 이메일 주소를 입력하세요.</p>
      <div class="email-container">
        <input type="email" placeholder="이메일 주소">
        <button>시작하기 ></button>
      </div>
    </div>
  </div>
  <section class="row">
  <h2>인기 콘텐츠</h2>
  <div class="row-posters">
    <img src="스크린샷 2025-07-16 161956.png" class="poster">
    <img src="스크린샷 2025-07-16 161956.png" class="poster">
    <img src="스크린샷 2025-07-16 161956.png" class="poster">
    <img src="스크린샷 2025-07-16 161956.png" class="poster">
  </div>
</section>

<section class="row">
  <h2>지금 뜨는 콘텐츠</h2>
  <div class="row-posters">
    <img src="스크린샷 2025-07-16 161956.png" class="poster">
    <img src="스크린샷 2025-07-16 161956.png" class="poster">
    <img src="스크린샷 2025-07-16 161956.png" class="poster">
    <img src="스크린샷 2025-07-16 161956.png" class="poster">
  </div>
</section>
</body>
</html>
